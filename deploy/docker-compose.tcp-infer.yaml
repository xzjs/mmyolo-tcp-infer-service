version: "3.9"

services:
  mmyolo-tcp-infer:
    build:
      context: ..
      dockerfile: docker/Dockerfile_tcp_infer
    image: mmyolo-tcp-infer:latest
    container_name: mmyolo-tcp-infer
    restart: unless-stopped
    gpus: all
    ports:
      - "9000:9000"
    environment:
      TCP_HOST: "0.0.0.0"
      TCP_PORT: "9000"
      MODEL_CONFIG: "/workspace/mmyolo/projects/piping/configs/yolov8_n_fast_8xb16-500e_defect_lower_lr_ag.py"
      MODEL_CHECKPOINT: "/workspace/mmyolo/weights/best_coco_破裂_precision_epoch_25.pth"
      MODEL_DEVICE: "cuda:0"
      SCORE_THR: "0.3"
      OUTPUT_DIR: "/workspace/mmyolo/output/tcp_results"
      INFER_STRIDE: "3"
      MAX_FRAMES: "-1"
      PROGRESS_EVERY_FRAMES: "30"
      PATH_MAPPINGS: '${PATH_MAPPINGS:-C:\\input_videos=/data/local_input}'
    volumes:
      - ../weights:/workspace/mmyolo/weights
      - ../output:/workspace/mmyolo/output
      - ${LOCAL_INPUT_DIR:-../input_videos}:/data/local_input
    command: >
      python tools/piping_infer/tcp_infer_server.py
      --host 0.0.0.0
      --port 9000
